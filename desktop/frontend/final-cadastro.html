<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finalizar Cadastro - NutriEsportiva São Camilo</title>
    <link rel="icon" type="image/png" href="images/icon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="body-login">
    <header class="header-simples">
        <a href="cadastro.html" class="voltar-link">
            <i class="fa-solid fa-chevron-left"></i>
            <span>Voltar</span>
        </a>
        <img class="logo-login" src="images/logoBranco.png" alt="Logo São Camilo" />
    </header>

    <main class="login-container">
        <div class="login-card">
            <form id="final-register-form">
                <div class="logo-box-form">
                    <img src="images/logo.png" alt="Logo São Camilo" class="logo-interna-card">
                </div>
                
                <h2>Quase lá!</h2>
                <p>Complete seus dados para finalizar o cadastro</p>
                
                <div class="input-box">
                    <select id="sexo-field" required>
                        <option value="" disabled selected>Sexo</option>
                        <option value="M">Masculino</option>
                        <option value="F">Feminino</option>
                        <option value="O">Outro</option>
                    </select>
                    <i class="fa-solid fa-venus-mars icon-input"></i>
                </div>

                <div class="input-box">
                    <input id="altura-field" type="number" step="0.01" placeholder="Altura (ex: 1.75)" required />
                    <i class="fa-solid fa-ruler-vertical icon-input"></i>
                </div>
                
                <div class="input-box">
                    <input id="peso-field" type="number" step="0.1" placeholder="Peso atual (kg)" required />
                    <i class="fa-solid fa-weight-hanging icon-input"></i>
                </div>

                <div class="input-box">
                    <input id="nascimento-field" type="text" onfocus="(this.type='date')" placeholder="Data de nascimento" required />
                    <i class="fa-solid fa-calendar-days icon-input"></i>
                </div>
                
                <button type="submit" class="botaoPrin">Cadastre-se</button>
            </form>
        </div>
    </main>
</body>
</html>
