<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - NutriEsportiva São Camilo</title>
  
  <link rel="icon" type="image/png" href="images/icon.ico">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="/desktop/frontend/css/style.css" />
</head>

<body class="body-login">
  
  <header class="header-simples">
    <a href="inicial.html" class="voltar-link">
      <i class="fa-solid fa-arrow-left"></i> Voltar
    </a>
    <img class="logo-login" src="/desktop/frontend/images/logoBranco.png" alt="Logo NutriEsportiva São Camilo" />
  </header>

  <main class="login-container">
    <div class="login-card">
      <form id="login-form">
        
        <div class="icone-usuario">
          <i class="fa-solid fa-user"></i>
        </div>
        
        <h2>Acesse sua conta</h2>
        <p>Preencha seus dados para continuar</p>
        
        <div class="input-box">
          <input id="username-field" type="text" placeholder="Usuário" required />
          <i class="fa-solid fa-envelope icon-input"></i>
        </div>
        
        <div class="input-box">
          <input id="password-field" type="password" placeholder="Senha" required />
          <button id="toggle-password" type="button" class="toggle-password">
            <i class="fa-solid fa-eye-slash" id="toggleIcon"></i>
          </button>
        </div>
        
        <button type="submit" class="botaoPrin">Entrar</button>

      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script type="module" src="../javascript/telaLogin.js"></script>
  
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>

</body>
</html>
