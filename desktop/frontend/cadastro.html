<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - NutriEsportiva São Camilo</title>
    
    <link rel="icon" type="image/png" href="images/icon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="body-login">
    
    <header class="header-simples">
        <a href="login.html" class="voltar-link">
            <i class="fa-solid fa-chevron-left"></i>
            <span>Voltar</span>
        </a>
        <img class="logo-login" src="images/logoBranco.png" alt="Logo São Camilo" />
    </header>

    <main class="login-container">
        <div class="login-card">
            <form id="register-form">
                
                <div class="icone-usuario">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                
                <h2>Crie sua conta</h2>
                <p>Preencha os campos para se cadastrar</p>
                
                <div class="input-box">
                    <input id="name-field" type="text" placeholder="Nome Completo" required />
                    <i class="fa-solid fa-id-card icon-input"></i>
                </div>

                <div class="input-box">
                    <input id="email-field" type="email" placeholder="E-mail Institucional" required />
                    <i class="fa-solid fa-envelope icon-input"></i>
                </div>
                
                <div class="input-box">
                    <input id="password-field" type="password" placeholder="Crie uma Senha" required />
                    <i class="fa-solid fa-lock icon-input"></i>
                </div>

                <div class="input-box">
                    <input id="confirm-password-field" type="password" placeholder="Confirme a Senha" required />
                    <i class="fa-solid fa-shield-halved icon-input"></i>
                </div>
                
                <button type="submit" class="botaoPrin">Cadastrar</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="js/telaCadastro.js"></script>

</body>
</html>
