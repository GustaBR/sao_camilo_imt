<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Atleta - São Camilo</title>
    
    <link rel="icon" type="image/png" href="images/icon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="body-perfil">

    <header class="cabecalho">
        <div class="logo-container">
            <img src="images/logo.png" alt="Logo São Camilo" class="logo-img">
        </div>
        <div class="perfil-info-topo">
            <span>Olá, <strong>Matheus</strong></span>
            <i class="fa-solid fa-circle-user"></i>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="card-status">
            <div class="status-header">
                <h3>Taxa de Sudorese Média</h3>
                <i class="fa-solid fa-droplet"></i>
            </div>
            <div class="valor-status">
                <span class="numero">1.2</span>
                <span class="unidade">L/h</span>
            </div>
            <p class="feedback-texto">Sua hidratação está dentro do esperado para o clima atual.</p>
        </section>

        <section class="historico-secao">
            <div class="secao-header">
                <h2>Últimos Treinos</h2>
                <a href="novo-treino.html" class="btn-novo">+ Novo</a>
            </div>

            <div class="grid-treinos">
                <div class="treino-item">
                    <div class="treino-data">28 Abr</div>
                    <div class="treino-detalhes">
                        <span class="treino-titulo">Treino de Corrida</span>
                        <span class="treino-sub">Perda: 0.8L | Clima: 24°C</span>
                    </div>
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
                
                <div class="treino-item">
                    <div class="treino-data">26 Abr</div>
                    <div class="treino-detalhes">
                        <span class="treino-titulo">Musculação</span>
                        <span class="treino-sub">Perda: 0.4L | Clima: 22°C</span>
                    </div>
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </div>
        </section>
    </main>

    <nav class="nav-inferior">
        <a href="perfil.html" class="nav-item ativo">
            <i class="fa-solid fa-house"></i>
            <span>Início</span>
        </a>
        <a href="treino.html" class="nav-item">
            <i class="fa-solid fa-plus-circle"></i>
            <span>Treinar</span>
        </a>
        <a href="config.html" class="nav-item">
            <i class="fa-solid fa-gear"></i>
            <span>Ajustes</span>
        </a>
    </nav>

</body>
</html>
